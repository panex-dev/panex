name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on origin/main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Go modules
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: '$(go env GOPATH)/bin/govulncheck ./...'

      - name: Audit production JavaScript dependencies
        run: pnpm audit --audit-level high --prod

      - name: Run TypeScript checks
        run: make check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          install-mode: goinstall

      - name: Run tests
        run: make test

      - name: Build project
        run: make build

      - name: Package release archives
        run: make release VERSION=${{ github.ref_name }}

      - name: Verify release binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          archive="dist/release/panex_${TAG}_linux_amd64.tar.gz"
          if [[ ! -f "$archive" ]]; then
            echo "::error::expected archive not found: $archive"
            exit 1
          fi
          tmp="$(mktemp -d)"
          tar -xzf "$archive" -C "$tmp"
          binary="$tmp/panex_${TAG}_linux_amd64/panex"
          if [[ ! -x "$binary" ]]; then
            echo "::error::binary not found or not executable: $binary"
            exit 1
          fi
          "$binary" version
          rm -rf "$tmp"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panex-release-${{ github.ref_name }}
          path: dist/release/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          assets=(dist/release/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "no release assets generated" >&2
            exit 1
          fi

          prerelease_args=()
          if [[ "$TAG" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --title "$TAG" --generate-notes "${prerelease_args[@]}"
          fi

      - name: Update Homebrew tap formula
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN not set — required for non-prerelease"
            exit 1
          fi
          ./scripts/update-homebrew-tap.sh --version "${{ github.ref_name }}"

      - name: Import GPG key for APT signing
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [[ -z "$APT_GPG_PRIVATE_KEY" ]]; then
            echo "::error::APT_GPG_PRIVATE_KEY not set — required for non-prerelease"
            exit 1
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Update APT repository
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::APT_REPO_TOKEN not set — required for non-prerelease"
            exit 1
          fi
          ./scripts/update-apt-repo.sh --version "${{ github.ref_name }}"

  build-msi:
    needs: verify-and-package
    strategy:
      matrix:
        include:
          - arch: x64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Install WiX v4
        run: dotnet tool install --global wix

      - name: Build MSI
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: ./scripts/build-msi.sh --version "$TAG" --arch ${{ matrix.arch }} --out-dir dist/release

      - name: Verify MSI was created
        shell: bash
        run: |
          shopt -s nullglob
          msi_files=(dist/release/*.msi)
          if [[ ${#msi_files[@]} -eq 0 ]]; then
            echo "::error::no MSI file found in dist/release/"
            exit 1
          fi
          echo "verified: ${msi_files[*]}"

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: gh release upload "$TAG" dist/release/*.msi --clobber
