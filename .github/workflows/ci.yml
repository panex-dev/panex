name: CI

on:
  push:
    branches:
      - main
      - feat/pr*
  pull_request:

permissions:
  contents: read

jobs:
  branch-base-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Reject PRs not targeting main
        if: github.event.pull_request.base.ref != 'main'
        run: |
          echo "::error::PR targets '${{ github.event.pull_request.base.ref }}' instead of 'main'."
          echo "All PRs must target the main branch. Chained feature-branch PRs are not allowed."
          echo ""
          echo "Fix: close this PR, rebase your branch onto main, and open a new PR targeting main."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify branch is rebased on origin/main
        run: ./scripts/pr-ensure-rebased.sh

  dependency-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Verify Go modules
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: '$(go env GOPATH)/bin/govulncheck ./...'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production JavaScript dependencies
        run: pnpm audit --audit-level high --prod

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          install-mode: goinstall

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build daemon
        run: go build ./cmd/panex/...

  typescript:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: shared-protocol
            dir: shared/protocol
            build: false
          - name: dev-agent
            dir: agent
            build: true
          - name: inspector
            dir: inspector
            build: true
          - name: chrome-sim
            dir: shared/chrome-sim
            build: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --dir "${{ matrix.package.dir }}" run check

      - name: Test
        run: pnpm --dir "${{ matrix.package.dir }}" run test

      - name: Build
        if: ${{ matrix.package.build }}
        run: pnpm --dir "${{ matrix.package.dir }}" run build
