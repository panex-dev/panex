name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  branch-base-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify branch is rebased on origin/main
        run: ./scripts/pr-ensure-rebased.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5

      - name: Run tests
        run: go test -race -count=1 ./...

  typescript:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: shared-protocol
            dir: shared/protocol
          - name: dev-agent
            dir: agent
          - name: inspector
            dir: inspector
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            shared/protocol/package.json
            agent/pnpm-lock.yaml
            inspector/pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ matrix.package.dir }}"
          if [[ -f "$dir/pnpm-lock.yaml" ]]; then
            pnpm --dir "$dir" install --frozen-lockfile
          else
            pnpm --dir "$dir" install --no-frozen-lockfile
          fi

      - name: Type-check
        run: pnpm --dir "${{ matrix.package.dir }}" run check

      - name: Test
        run: pnpm --dir "${{ matrix.package.dir }}" run test
